<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mr Distribuidora de Bebidas</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

/* BANNER */
.banner img {
  width: 100%;
  height: auto;
}

/* RELÓGIO */
.relogio {
  text-align: center;
  font-size: 18px;
  color: #00ff88;
  margin: 10px;
}

/* PRODUTOS */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #111;
  border: 1px solid #00ff88;
  border-radius: 10px;
  padding: 15px;
  margin: 10px;
  width: 200px;
  text-align: center;
}

.card button {
  margin: 5px;
  padding: 8px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.add { background: green; color: white; }
.rem { background: red; color: white; }

/* CARRINHO */
.carrinho {
  text-align: center;
  margin-top: 20px;
}

/* INPUTS */
input {
  padding: 8px;
  margin: 5px;
  width: 250px;
}

/* FINALIZAR */
.finalizar {
  background: #25D366;
  padding: 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* WHATS FLOAT */
.whats {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  font-size: 24px;
  text-decoration: none;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 12px;
  margin-top: 30px;
  color: #aaa;
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
<img src="banner.png">
</div>

<!-- RELÓGIO -->
<div class="relogio" id="relogio"></div>

<!-- PRODUTOS -->
<div class="container">

<div class="card">
<p>Skol / Brahma / Antarctica</p>
<p>R$ 4,50</p>
<button class="add" onclick="add('Cerveja',4.5)">+</button>
<button class="rem" onclick="remover('Cerveja')">-</button>
</div>

<div class="card">
<p>Itaipava / Kaiser</p>
<p>R$ 4,00</p>
<button class="add" onclick="add('Itaipava',4)">+</button>
<button class="rem" onclick="remover('Itaipava')">-</button>
</div>

<div class="card">
<p>Heineken</p>
<p>R$ 8,00</p>
<button class="add" onclick="add('Heineken',8)">+</button>
<button class="rem" onclick="remover('Heineken')">-</button>
</div>

<div class="card">
<p>Coca-Cola 2L</p>
<p>R$ 12,50</p>
<button class="add" onclick="add('Coca-Cola',12.5)">+</button>
<button class="rem" onclick="remover('Coca-Cola')">-</button>
</div>

</div>

<!-- CARRINHO -->
<div class="carrinho">
<h2>🛒 Seu Pedido</h2>
<div id="lista"></div>
<p id="total"></p>

<input id="nome" placeholder="Seu nome"><br>
<input id="endereco" placeholder="Endereço"><br>
<input id="telefone" placeholder="Telefone"><br>
<input id="horario" placeholder="Horário de entrega"><br>

<button class="finalizar" onclick="finalizar()">Finalizar Pedido</button>
</div>

<!-- WHATS -->
<a class="whats" href="https://wa.me/5544997410776">📲</a>

<!-- FOOTER -->
<div class="footer">
📍 Rua Rachel de Queiroz Nº 425 - Palotina-PR<br>
📄 CNPJ: 55.522.790/0001-67<br>
💳 PIX: 801.758.389-33 - Veronica Gamarra Roman (Caixa)<br><br>
🚫 Proibida venda para menores de 18 anos
</div>

<script>
let carrinho = {};

function add(nome, preco){
  if(!carrinho[nome]){
    carrinho[nome] = {qtd:0, preco:preco};
  }
  carrinho[nome].qtd++;
  atualizar();
}

function remover(nome){
  if(carrinho[nome]){
    carrinho[nome].qtd--;
    if(carrinho[nome].qtd <= 0){
      delete carrinho[nome];
    }
  }
  atualizar();
}

function atualizar(){
  let html = "";
  let total = 0;

  for(let item in carrinho){
    let d = carrinho[item];
    let sub = d.qtd * d.preco;
    total += sub;
    html += `${item} x${d.qtd} = R$ ${sub.toFixed(2)}<br>`;
  }

  document.getElementById("lista").innerHTML = html;
  document.getElementById("total").innerHTML = "Total: R$ " + total.toFixed(2);
}

function finalizar(){
  let nome = document.getElementById("nome").value;
  let endereco = document.getElementById("endereco").value;
  let telefone = document.getElementById("telefone").value;
  let horario = document.getElementById("horario").value;

  let msg = "Olá tudo bem queria finalizar meu pedido%0A%0A";
  let total = 0;

  for(let item in carrinho){
    let d = carrinho[item];
    let sub = d.qtd * d.preco;
    total += sub;
    msg += `${item} x${d.qtd} = R$ ${sub.toFixed(2)}%0A`;
  }

  msg += `%0ATotal: R$ ${total.toFixed(2)}`;
  msg += `%0A%0ANome: ${nome}`;
  msg += `%0AEndereço: ${endereco}`;
  msg += `%0ATelefone: ${telefone}`;
  msg += `%0AHorário: ${horario}`;

  window.open(`https://wa.me/5544997410776?text=${msg}`);
}

/* RELÓGIO */
setInterval(()=>{
  let agora = new Date();
  document.getElementById("relogio").innerHTML =
    "⏰ " + agora.toLocaleTimeString();
},1000);
</script>

</body>
</html>
